<script>
    const refresh = async () => {
        while (true) {
            document.getElementById("message").className = "updating"
            document.getElementById("committer").className = "updating"
            document.getElementById("message").textContent = "fetching"
            document.getElementById("committer").textContent = "fetching"
            await delay(0.05 * 1000)
            if (document.hasFocus()){
            document.getElementById("message").textContent = "fetching."
            document.getElementById("committer").textContent = "fetching."
            await delay(0.05 * 1000)
            document.getElementById("message").textContent = "fetching.."
            document.getElementById("committer").textContent = "fetching.."
            await delay(0.05 * 1000)
            document.getElementById("message").textContent = "fetching..."
            document.getElementById("committer").textContent = "fetching..."
            await delay(0.1 * 1000)
            getCommit('benheroblaw', 'benheroblaw.github.io')}
            await delay(5 * 1000)
        }
    };

    const onlineRefresh = async () => {
        var x = ' '
        while (true) {
            x = ' ' + navigator.onLine
            document.getElementById('online').textContent = x
            if (x = false) {document.getElementById('online').style.color = '#8b0000'}
            if (x = true) {document.getElementById('online').style.color = '#0f0'}
            await delay(0.5 * 1000)
        }
    }
</script>

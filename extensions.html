<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/icons/extensions.png">
    <script src="/script.js"></script>
</head>
<title>Extensions</title>
<html>
    <body class="center" onload="startStory(extensions, 'top')">
        <div id="sidebar"></div>
    </body>
</html>
<script>
var extensions = [
    `<h2>doujin.io title</h2>
    <h3 id="doujinVer"></h3>`,

    `${ah2('bullshit.js')}
    <h3 id="bsVer"></h3>`,

    `${ah2('r34 sorting')}
    <h3 id="r34sortVer"></h3>`
]

let doujinVer = [
    '1.0',
    '1.1',
    '1.2',
    '1.3',
    '1.4',
    '1.4.1',
    '1.4.2',
]

doujinVer.sort()
doujinVer.reverse()

let output = ''
for (const key in doujinVer) {
    if (!Object.hasOwn(doujinVer, key)) continue;

    const element = doujinVer[key];

    if (key === '0') {
        output += `<a href="/extensions/doujin.io/releases/${element}.xpi" id="doujinNewest">${element}</a><br>`
    }
    else {
        output += `<a href="/extensions/doujin.io/releases/${element}.xpi">${element}</a><br>`
    }

}
extensions[0] += output
output = ''
</script>
